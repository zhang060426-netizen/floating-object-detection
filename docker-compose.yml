services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: floating-backend:phase2b-batch3
    container_name: floating-backend
    ports:
      - "5000:5000"
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:-phase2b-dev-secret-change-me}
      JWT_SECRET: ${JWT_SECRET:-phase2b-dev-secret-change-me}
      JWT_EXPIRE_SECONDS: ${JWT_EXPIRE_SECONDS:-86400}
      APP_DB_PATH: /app/runtime/db/app.sqlite3
      APP_STORAGE_ROOT: /app/runtime
      AI_MODEL_ROOT: /app/runtime/models
      APP_UPLOAD_MAX_MB: ${APP_UPLOAD_MAX_MB:-16}
    volumes:
      - ./runtime/db:/app/runtime/db
      - ./runtime/models:/app/runtime/models:ro
      - ./runtime/uploads:/app/runtime/uploads
      - ./runtime/results:/app/runtime/results
    networks:
      - floating-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-.}
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.frontend}
      args:
        VITE_API_BASE_URL: /api
    image: floating-objects-frontend:phase2b-batch3
    container_name: floating-frontend
    environment:
      BACKEND_UPSTREAM: http://backend:5000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - floating-net
    restart: unless-stopped

networks:
  floating-net:
    name: floating-net
